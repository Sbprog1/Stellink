# Stellink — local development services
#
# Spins up a PocketBase instance for the frontend to talk to. The frontend
# itself runs locally with `npm run dev` (Vite hot-reloads better outside
# Docker than inside it).
#
# Usage:
#   docker compose up -d
#   open http://127.0.0.1:8090/_/   # PocketBase admin (first run prompts for superuser)
#
# The schema is applied via `scripts/pocketbase-setup.sh` once the admin
# account exists.

services:
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:0.22.21
    container_name: stellink-pocketbase
    restart: unless-stopped
    command: ["--dir=/pb_data", "--http=0.0.0.0:8090"]
    ports:
      - "127.0.0.1:8090:8090"
    volumes:
      - ./.pocketbase/pb_data:/pb_data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8090/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
