<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1929"/>
      <stop offset="100%" stop-color="#0f2a3f"/>
    </linearGradient>
    <linearGradient id="link" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="trail" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#22d3ee" stop-opacity="0.0"/>
      <stop offset="50%"  stop-color="#22d3ee" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="starGlowL" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"   stop-color="#22d3ee" stop-opacity="0.55"/>
      <stop offset="60%"  stop-color="#22d3ee" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="starGlowR" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"   stop-color="#14b8a6" stop-opacity="0.55"/>
      <stop offset="60%"  stop-color="#14b8a6" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded card -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Soft glows behind the two stars -->
  <circle cx="120" cy="200" r="100" fill="url(#starGlowL)"/>
  <circle cx="392" cy="312" r="100" fill="url(#starGlowR)"/>

  <!-- The link / trail between the two stars (diagonal arc) -->
  <path d="M 138 218
           Q 256 256 374 294"
        stroke="url(#trail)"
        stroke-width="14"
        fill="none"
        stroke-linecap="round"/>

  <!-- Particle dots along the trail to imply motion -->
  <circle cx="200" cy="240" r="4" fill="#22d3ee" opacity="0.55"/>
  <circle cx="256" cy="256" r="5" fill="#22d3ee" opacity="0.75"/>
  <circle cx="312" cy="272" r="4" fill="#14b8a6" opacity="0.65"/>

  <!-- Left star (4-point sparkle) -->
  <g transform="translate(120 200)">
    <path d="M 0 -54
             L 14 -14
             L 54 0
             L 14 14
             L 0 54
             L -14 14
             L -54 0
             L -14 -14 Z"
          fill="url(#link)"/>
    <circle r="9" fill="#0a1929"/>
  </g>

  <!-- Right star (4-point sparkle) -->
  <g transform="translate(392 312)">
    <path d="M 0 -54
             L 14 -14
             L 54 0
             L 14 14
             L 0 54
             L -14 14
             L -54 0
             L -14 -14 Z"
          fill="url(#link)"/>
    <circle r="9" fill="#0a1929"/>
  </g>
</svg>
