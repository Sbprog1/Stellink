<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1929"/>
      <stop offset="100%" stop-color="#0f2a3f"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="beamFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="60%"  stop-color="#22d3ee" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="1"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"   stop-color="#22d3ee" stop-opacity="0.45"/>
      <stop offset="60%"  stop-color="#22d3ee" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded square card -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Soft glow behind the beam target -->
  <circle cx="368" cy="256" r="160" fill="url(#glow)"/>

  <!-- Source dot (origin of the beam) -->
  <circle cx="120" cy="256" r="22" fill="#22d3ee"/>
  <circle cx="120" cy="256" r="36" fill="#22d3ee" opacity="0.18"/>

  <!-- Three diverging beam rays -->
  <path d="M 132 252
           Q 220 220 380 196"
        stroke="url(#beamFade)"
        stroke-width="10"
        fill="none"
        stroke-linecap="round"/>

  <path d="M 134 256
           L 388 256"
        stroke="url(#beamFade)"
        stroke-width="14"
        fill="none"
        stroke-linecap="round"/>

  <path d="M 132 260
           Q 220 292 380 316"
        stroke="url(#beamFade)"
        stroke-width="10"
        fill="none"
        stroke-linecap="round"/>

  <!-- Target chevron (the "beam landing zone") -->
  <path d="M 380 196
           L 412 256
           L 380 316"
        stroke="url(#beam)"
        stroke-width="22"
        fill="none"
        stroke-linecap="round"
        stroke-linejoin="round"/>
</svg>
